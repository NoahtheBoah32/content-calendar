<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0E0E10;--surface:#18181B;--surface-hover:#1F1F23;--surface-raised:#222226;
    --border:#2A2A2E;--border-strong:#3A3A3F;--text:#E8E6E3;--text-secondary:#9A9590;
    --text-muted:#5C5853;--accent:#E8553A;--instagram:#E5B83A;--instagram-bg:rgba(229,184,58,.12);
    --instagram-border:rgba(229,184,58,.22);--ig-reel:#7BA05B;--ig-reel-bg:rgba(123,160,91,.12);
    --ig-reel-border:rgba(123,160,91,.22);--youtube:#E03B3B;--youtube-bg:rgba(224,59,59,.12);
    --youtube-border:rgba(224,59,59,.22);--draft:#6B6660;--draft-bg:rgba(107,102,96,.12);
    --draft-border:rgba(107,102,96,.22);--overlay:rgba(0,0,0,.7);--radius:8px;--radius-lg:14px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 20px rgba(0,0,0,.35);
    --shadow-lg:0 16px 56px rgba(0,0,0,.6);--transition:180ms cubic-bezier(.4,0,.2,1);
  }
  html{font-size:15px}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:1120px;margin:0 auto;padding:48px 32px 64px}
  .header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px}
  .header-left{display:flex;align-items:baseline;gap:20px}
  .brand{font-family:'Instrument Serif',serif;font-size:2.4rem;letter-spacing:-.03em;color:var(--text);line-height:1}
  .brand-sub{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);font-weight:500;position:relative;top:-2px}
  .nav{display:flex;align-items:center;gap:6px}
  .nav-btn{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:all var(--transition);user-select:none}
  .nav-btn:hover{border-color:var(--border-strong);background:var(--surface-hover)}
  .nav-btn.arrow{width:38px;padding:0;font-size:1.1rem}
  .nav-btn.today{color:var(--accent);border-color:var(--accent);font-weight:600}
  .nav-btn.today:hover{background:var(--accent);color:#fff}
  .month-label{font-family:'Instrument Serif',serif;font-size:1.55rem;min-width:220px;text-align:center;letter-spacing:-.02em;line-height:38px}
  .calendar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
  .weekday{padding:14px 12px 12px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);text-align:left}
  .weekday:not(:last-child){border-right:1px solid var(--border)}
  .days{display:grid;grid-template-columns:repeat(7,1fr)}
  .day-cell{min-height:120px;padding:8px 10px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);cursor:pointer;transition:background var(--transition);position:relative;animation:fadeInCell 300ms ease both;overflow:hidden}
  .day-cell:nth-child(7n){border-right:none}
  .days .day-cell:nth-last-child(-n+7){border-bottom:none}
  .day-cell:hover{background:var(--surface-hover)}
  .day-cell.outside{background:#131315;cursor:default}
  .day-cell.outside .day-num{color:var(--text-muted);opacity:.5}
  .day-cell.outside .item{opacity:.4}
  .day-num{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:500;color:var(--text-secondary);margin-bottom:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all var(--transition)}
  .day-cell.today .day-num{background:var(--accent);color:#fff;font-weight:600}
  .items{display:flex;flex-direction:column;gap:3px;overflow:hidden;min-width:0}
  .item{display:flex;align-items:center;gap:6px;padding:3px 7px;border-radius:5px;font-size:.72rem;font-weight:500;line-height:1.35;white-space:nowrap;overflow:hidden;max-width:100%;border:1px solid transparent;transition:all var(--transition)}
  .item.instagram{background:var(--instagram-bg);color:var(--instagram);border-color:var(--instagram-border)}
  .item.ig-reel{background:var(--ig-reel-bg);color:var(--ig-reel);border-color:var(--ig-reel-border)}
  .item.youtube{background:var(--youtube-bg);color:var(--youtube);border-color:var(--youtube-border)}
  .item.draft{background:var(--draft-bg);color:var(--draft);border-color:var(--draft-border)}
  .item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .instagram .item-dot{background:var(--instagram)}
  .ig-reel .item-dot{background:var(--ig-reel)}
  .youtube .item-dot{background:var(--youtube)}
  .draft .item-dot{background:var(--draft)}
  .item-title{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .item-drive-dot{width:5px;height:5px;border-radius:50%;background:#4285F4;flex-shrink:0;margin-left:auto;opacity:.7}
  .more-badge{font-size:.68rem;font-weight:600;color:var(--text-muted);padding:2px 0;margin-top:1px;letter-spacing:.01em}
  .overlay{position:fixed;inset:0;background:var(--overlay);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 250ms ease,visibility 250ms ease;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .overlay.open{opacity:1;visibility:visible}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:500px;max-width:calc(100vw - 32px);max-height:calc(100vh - 64px);overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(14px) scale(.97);transition:transform 300ms cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .overlay.open .modal{transform:translateY(0) scale(1)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 0}
  .modal-title{font-family:'Instrument Serif',serif;font-size:1.5rem;letter-spacing:-.02em}
  .modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-muted);font-size:1.3rem;cursor:pointer;border-radius:var(--radius);transition:all var(--transition)}
  .modal-close:hover{background:var(--surface-hover);color:var(--text)}
  .modal-body{padding:24px 28px 28px;display:flex;flex-direction:column;gap:18px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field label,.drive-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-secondary)}
  .field input,.field textarea{font-family:'DM Sans',sans-serif;font-size:.9rem;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#141416;color:var(--text);outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
  .field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,85,58,.12)}
  .field input::placeholder,.field textarea::placeholder{color:var(--text-muted)}
  .field textarea{resize:vertical;min-height:76px;line-height:1.55}
  /* Drive */
  .drive-section{display:flex;flex-direction:column;gap:7px}
  .drive-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 16px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-secondary);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all var(--transition)}
  .drive-btn:hover{border-style:solid;border-color:#4B6FDE;color:var(--text);background:rgba(66,133,244,.06)}
  .drive-btn svg{flex-shrink:0}
  .drive-preview{display:none;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#141416;position:relative;overflow:hidden}
  .drive-preview::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#4285F4,#34A853,#FBBC05,#EA4335);border-radius:3px 0 0 3px}
  .drive-thumb{width:76px;height:54px;border-radius:5px;overflow:hidden;background:var(--surface-raised);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative}
  .drive-thumb img{width:100%;height:100%;object-fit:cover;display:none;border-radius:5px}
  .drive-thumb-icon{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
  .drive-thumb.is-video::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.3);border-radius:5px}
  .play-icon{position:absolute;z-index:2;width:22px;height:22px;background:rgba(255,255,255,.9);border-radius:50%;display:none;align-items:center;justify-content:center}
  .play-icon svg{margin-left:2px}
  .drive-info{flex:1;min-width:0}
  .drive-info-name{font-size:.84rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
  .drive-info-meta{display:flex;align-items:center;gap:8px}
  .drive-type-badge{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:20px;background:rgba(66,133,244,.15);color:#7BAAF7;border:1px solid rgba(66,133,244,.25)}
  .drive-type-badge.video-badge{background:rgba(234,67,53,.12);color:#F28B82;border-color:rgba(234,67,53,.2)}
  .drive-type-badge.folder-badge{background:rgba(251,188,5,.12);color:#FDD663;border-color:rgba(251,188,5,.2)}
  .drive-type-badge.image-badge{background:rgba(52,168,83,.12);color:#81C995;border-color:rgba(52,168,83,.2)}
  .drive-file-id-row{display:flex;align-items:center;gap:6px;margin-top:5px}
  .drive-file-id-label{font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .drive-file-id-value{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
  .drive-actions{display:flex;gap:6px;position:absolute;top:10px;right:10px}
  .drive-action-btn{height:24px;padding:0 8px;font-size:.68rem;font-weight:500;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);border-radius:5px;cursor:pointer;transition:all var(--transition)}
  .drive-action-btn:hover{border-color:var(--border-strong);color:var(--text)}
  .drive-action-btn.clear-btn:hover{border-color:rgba(224,59,59,.4);color:var(--youtube)}
  .drive-auth-notice{display:none;align-items:center;gap:8px;padding:10px 12px;background:rgba(66,133,244,.08);border:1px solid rgba(66,133,244,.2);border-radius:var(--radius);font-size:.78rem;color:#7BAAF7}
  .drive-auth-notice.visible{display:flex}
  .drive-config-warning{display:none;font-size:.72rem;color:var(--text-muted);padding:6px 0 0}
  .drive-config-warning.visible{display:block}
  .drive-config-warning code{font-family:monospace;font-size:.68rem;background:var(--surface-raised);padding:1px 4px;border-radius:3px}
  .drive-config-warning a{color:#7BAAF7;text-decoration:none}
  .drive-config-warning a:hover{text-decoration:underline}
  .platform-options{display:flex;gap:10px}
  .platform-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text-secondary);transition:all var(--transition);user-select:none}
  .platform-opt:hover{border-color:var(--border-strong)}
  .platform-opt.selected.instagram-opt{border-color:var(--instagram);background:var(--instagram-bg);color:var(--instagram)}
  .platform-opt.selected.youtube-opt{border-color:var(--youtube);background:var(--youtube-bg);color:var(--youtube)}
  .plat-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
  .instagram-opt .plat-icon{background:var(--instagram)}
  .youtube-opt .plat-icon{background:var(--youtube)}
  .modal-actions{display:flex;gap:10px;align-items:center}
  .delete-btn{display:none;padding:13px 18px;border:1px solid rgba(224,59,59,.35);border-radius:var(--radius);background:rgba(224,59,59,.08);color:var(--youtube);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all var(--transition);white-space:nowrap;flex-shrink:0}
  .delete-btn:hover{background:rgba(224,59,59,.18);border-color:var(--youtube)}
  .delete-btn.visible{display:block}
  .submit-btn{flex:1;padding:13px 20px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:.01em}
  .submit-btn:hover{background:#F0F0ED;transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .submit-btn:active{transform:translateY(0)}
  .legend{display:flex;align-items:center;gap:20px;margin-top:20px;padding:0 4px}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:.75rem;color:var(--text-secondary)}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  /* View toggle */
  .view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-left:8px}
  .view-toggle-btn{padding:0 16px;height:38px;border:none;background:transparent;color:var(--text-secondary);font-family:inherit;font-size:.78rem;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all var(--transition);user-select:none}
  .view-toggle-btn:not(:last-child){border-right:1px solid var(--border)}
  .view-toggle-btn:hover{color:var(--text);background:var(--surface-hover)}
  .view-toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* Week view */
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);min-height:520px}
  .week-col{border-right:1px solid var(--border);padding:0;display:flex;flex-direction:column}
  .week-col:last-child{border-right:none}
  .week-col-header{padding:14px 12px 12px;border-bottom:1px solid var(--border);text-align:left}
  .week-col-day{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
  .week-col-date{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:500;color:var(--text-secondary);margin-top:2px}
  .week-col.today .week-col-date{color:var(--accent);font-weight:700}
  .week-col-items{padding:8px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto}
  .week-item{padding:10px 12px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all var(--transition);animation:fadeInCell 300ms ease both}
  .week-item:hover{background:var(--surface-hover)}
  .week-item.instagram{background:var(--instagram-bg);border-color:var(--instagram-border)}
  .week-item.ig-reel{background:var(--ig-reel-bg);border-color:var(--ig-reel-border)}
  .week-item.youtube{background:var(--youtube-bg);border-color:var(--youtube-border)}
  .week-item.draft{background:var(--draft-bg);border-color:var(--draft-border)}
  .week-item-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .week-item-badge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:20px;flex-shrink:0}
  .week-item.instagram .week-item-badge{background:rgba(229,184,58,.2);color:var(--instagram)}
  .week-item.ig-reel .week-item-badge{background:rgba(123,160,91,.2);color:var(--ig-reel)}
  .week-item.youtube .week-item-badge{background:rgba(224,59,59,.2);color:var(--youtube)}
  .week-item.draft .week-item-badge{background:rgba(107,102,96,.2);color:var(--draft)}
  .week-item-time{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);margin-left:auto;flex-shrink:0}
  .week-item-title{font-size:.84rem;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:2px}
  .week-item-desc{font-size:.75rem;color:var(--text-secondary);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .week-item-thumb{width:100%;height:56px;border-radius:5px;overflow:hidden;margin-top:6px;background:var(--surface-raised);display:flex;align-items:center;justify-content:center;position:relative}
  .week-item-thumb img{width:100%;height:100%;object-fit:cover}
  .week-item-drive{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:.65rem;color:#7BAAF7;opacity:.7}
  .week-item-drive::before{content:'';width:5px;height:5px;border-radius:50%;background:#4285F4}
  .week-empty{font-size:.75rem;color:var(--text-muted);padding:12px 4px;text-align:center;opacity:.5}
  /* Tooltip */
  .cal-tooltip{position:fixed;background:var(--surface-raised);border:1px solid var(--border-strong);border-radius:6px;padding:8px 11px;font-size:.74rem;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity 120ms ease,transform 120ms ease;z-index:9999;box-shadow:var(--shadow-md);line-height:1.4}
  .cal-tooltip.visible{opacity:1;transform:translateY(0)}
  .cal-tooltip .tt-title{font-weight:600;margin-bottom:2px}
  .cal-tooltip .tt-time{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted)}
  /* Clickable header */
  .month-label{cursor:pointer}
  .month-label:hover{color:var(--accent)}
  @keyframes fadeInCell{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
  .drive-loading{animation:shimmer 1.2s ease infinite}
  .days .day-cell:nth-child(1){animation-delay:10ms}.days .day-cell:nth-child(2){animation-delay:20ms}.days .day-cell:nth-child(3){animation-delay:30ms}.days .day-cell:nth-child(4){animation-delay:40ms}.days .day-cell:nth-child(5){animation-delay:50ms}.days .day-cell:nth-child(6){animation-delay:60ms}.days .day-cell:nth-child(7){animation-delay:70ms}.days .day-cell:nth-child(8){animation-delay:80ms}.days .day-cell:nth-child(9){animation-delay:90ms}.days .day-cell:nth-child(10){animation-delay:100ms}.days .day-cell:nth-child(11){animation-delay:110ms}.days .day-cell:nth-child(12){animation-delay:120ms}.days .day-cell:nth-child(13){animation-delay:130ms}.days .day-cell:nth-child(14){animation-delay:140ms}.days .day-cell:nth-child(15){animation-delay:150ms}.days .day-cell:nth-child(16){animation-delay:160ms}.days .day-cell:nth-child(17){animation-delay:170ms}.days .day-cell:nth-child(18){animation-delay:180ms}.days .day-cell:nth-child(19){animation-delay:190ms}.days .day-cell:nth-child(20){animation-delay:200ms}.days .day-cell:nth-child(21){animation-delay:210ms}.days .day-cell:nth-child(22){animation-delay:220ms}.days .day-cell:nth-child(23){animation-delay:230ms}.days .day-cell:nth-child(24){animation-delay:240ms}.days .day-cell:nth-child(25){animation-delay:250ms}.days .day-cell:nth-child(26){animation-delay:260ms}.days .day-cell:nth-child(27){animation-delay:270ms}.days .day-cell:nth-child(28){animation-delay:280ms}.days .day-cell:nth-child(29){animation-delay:290ms}.days .day-cell:nth-child(30){animation-delay:300ms}.days .day-cell:nth-child(31){animation-delay:310ms}.days .day-cell:nth-child(32){animation-delay:320ms}.days .day-cell:nth-child(33){animation-delay:330ms}.days .day-cell:nth-child(34){animation-delay:340ms}.days .day-cell:nth-child(35){animation-delay:350ms}
  @media(max-width:700px){.app{padding:24px 12px 40px}.header{flex-direction:column;gap:12px}.brand{font-size:1.8rem}.day-cell{min-height:90px;padding:6px}.day-num{font-size:.7rem;width:24px;height:24px}.item{font-size:.65rem;padding:2px 5px}.weekday{padding:10px 6px 8px;font-size:.6rem}.modal{width:calc(100vw - 16px)}.field-row{grid-template-columns:1fr;gap:14px}.drive-file-id-row{display:none}}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1 class="brand">Calendar</h1>
      <span class="brand-sub">Content Studio</span>
    </div>
    <div class="nav">
      <button class="nav-btn today" id="todayBtn">Today</button>
      <button class="nav-btn arrow" id="prevBtn">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn arrow" id="nextBtn">&#8250;</button>
      <div class="view-toggle">
        <button class="view-toggle-btn active" id="monthViewBtn">Month</button>
        <button class="view-toggle-btn" id="weekViewBtn">Week</button>
      </div>
    </div>
  </div>
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
      <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

<script>
(function(){
  // ── GOOGLE DRIVE CONFIG ──────────────────────────────────────
  // 1. https://console.cloud.google.com → create project
  // 2. Enable "Google Drive API" and "Google Picker API"
  // 3. Create API Key + OAuth 2.0 Client ID (Web app)
  // 4. Add your origin to "Authorized JavaScript origins"
  const GOOGLE_API_KEY   = 'AIzaSyAiNyU0i9SVgnEYRzxSXw5DwBWWdRd7Y2A';
  const GOOGLE_CLIENT_ID = '432544931051-qpc7ip56in7imk1lf9gg7ekf04892g8m.apps.googleusercontent.com';
  // ─────────────────────────────────────────────────────────────

  const DRIVE_CONFIGURED =
    GOOGLE_API_KEY   !== 'YOUR_API_KEY' &&
    GOOGLE_CLIENT_ID !== 'YOUR_CLIENT_ID.apps.googleusercontent.com';

  const now = new Date();
  let currentYear  = now.getFullYear();
  let currentMonth = now.getMonth();
  let selectedPlatform = null;
  let currentDriveFile = null;
  let editingPost = null; // { key, index } when editing, null when creating

  // View state
  let currentView = localStorage.getItem('calendarView') || 'month';
  // Week tracking: store the Sunday of the current week
  let weekStart = (function(){ const d=new Date(now); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d; })();

  // Google state
  let accessToken    = null;
  let tokenClient    = null;
  let pickerApiLoaded = false;

  // ── PERSISTENCE ──
  function loadPosts(){
    try{ const s=localStorage.getItem('contentCalendarPosts'); return s?JSON.parse(s):null; }
    catch{ return null; }
  }
  function savePosts(){ try{ localStorage.setItem('contentCalendarPosts',JSON.stringify(posts)); }catch(e){} }

  const savedPosts = loadPosts();
  const posts = savedPosts || {};

  function makeId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

  // Ensure all existing posts have IDs
  Object.values(posts).forEach(arr=>arr.forEach(p=>{ if(!p.id) p.id=makeId(); }));

  // One-time cleanup: remove duplicate posts per day (keep first non-TBD, or first if all TBD)
  (function dedup(){
    let cleaned=false;
    for(const[key,arr] of Object.entries(posts)){
      const seen=new Map();
      const keep=[];
      for(const p of arr){
        const isCarousel=p.driveFileType==='carousel'||(p.title||'').toLowerCase().includes('carousel');
        const type=p.platform+'-'+(isCarousel?'carousel':'reel');
        if(!seen.has(type)){
          seen.set(type,keep.length);
          keep.push(p);
        } else {
          // Duplicate — keep the one with a real name (not TBD)
          const existIdx=seen.get(type);
          if(keep[existIdx].title.includes('- TBD')&&!p.title.includes('- TBD')){
            keep[existIdx]=p;
          }
          cleaned=true;
        }
      }
      if(keep.length!==arr.length) posts[key]=keep;
      if(posts[key].length===0) delete posts[key];
    }
    if(cleaned) savePosts();
  })();

  // Fetch pipeline data from data/posts.json and merge (pipeline fills gaps, localStorage wins conflicts)
  (async function mergePipelineData(){
    try{
      const r=await fetch('data/posts.json?t='+Date.now());
      if(!r.ok) return;
      const pipelineData=await r.json();
      let changed=false;
      for(const[key,pipelinePosts] of Object.entries(pipelineData)){
        if(!posts[key]){
          posts[key]=pipelinePosts;
          changed=true;
        } else {
          for(const pp of pipelinePosts){
            const isCarousel=pp.driveFileType==='carousel'||pp.title.toLowerCase().includes('carousel');
            // Skip if date already has a non-TBD post of the same type
            const hasExisting=posts[key].some(p=>{
              const pIsCarousel=p.driveFileType==='carousel'||p.title.toLowerCase().includes('carousel');
              return pIsCarousel===isCarousel && !p.title.includes('- TBD');
            });
            if(hasExisting) continue;
            // Replace TBD slot if one exists
            const tdbIdx=posts[key].findIndex(p=>p.title&&p.title.includes('- TBD')&&
              ((isCarousel&&p.title.includes('Carousel'))||(!isCarousel&&p.title.includes('Reel'))));
            if(tdbIdx>=0){
              posts[key][tdbIdx]={...pp,id:posts[key][tdbIdx].id};
              changed=true;
            } else if(!posts[key].some(p=>p.id===pp.id)){
              posts[key].push(pp);
              changed=true;
            }
          }
        }
      }
      if(changed){ savePosts(); renderView(); }
    }catch(e){ console.warn('Pipeline data fetch failed:',e); }
  })();

  function addPost(year,month,day,platform,title,extra={}){
    const key=`${year}-${month}-${day}`;
    if(!posts[key]) posts[key]=[];
    posts[key].push({id:makeId(),platform,title,...extra});
    savePosts();
  }

  function updatePost(key,index,platform,title,extra={}){
    const p=posts[key][index];
    posts[key][index]={...p,platform,title,...extra};
    savePosts();
  }

  function deletePost(key,index){
    posts[key].splice(index,1);
    if(posts[key].length===0) delete posts[key];
    savePosts();
  }

  if(!savedPosts){
    const cm=currentMonth,cy=currentYear;
    addPost(cy,cm,2,'instagram','Morning routine reel');
    addPost(cy,cm,2,'youtube','Weekly vlog #47');
    addPost(cy,cm,5,'instagram','Product launch teaser');
    addPost(cy,cm,5,'draft','Behind the scenes draft');
    addPost(cy,cm,5,'youtube','Tutorial: Lighting setup');
    addPost(cy,cm,5,'instagram','Collab announcement');
    addPost(cy,cm,8,'youtube','Q&A session recording');
    addPost(cy,cm,10,'instagram','Carousel: Top 5 tips');
    addPost(cy,cm,10,'draft','Script: brand story');
    addPost(cy,cm,12,'youtube','Studio tour video');
    addPost(cy,cm,14,'instagram',"Valentine's giveaway");
    addPost(cy,cm,14,'instagram','Story poll: favorites');
    addPost(cy,cm,14,'draft','Email newsletter copy');
    addPost(cy,cm,14,'youtube','Live stream prep');
    addPost(cy,cm,18,'draft','Blog post outline');
    addPost(cy,cm,20,'instagram','Reel: day in my life');
    addPost(cy,cm,20,'youtube','Unboxing haul video');
    addPost(cy,cm,22,'draft','Podcast episode notes');
    addPost(cy,cm,25,'instagram','Feed photo: flat lay');
    addPost(cy,cm,25,'youtube','Monthly recap vlog');
    addPost(cy,cm,25,'draft','Caption ideas batch');
    addPost(cy,cm,28,'instagram','Reel: quick recipe');
  }

  // ── DOM ──
  const monthLabel=document.getElementById('monthLabel');
  const daysGrid=document.getElementById('daysGrid');
  const overlay=document.getElementById('overlay');
  const modalClose=document.getElementById('modalClose');
  const modalTitle=document.getElementById('modalTitle');
  const postDate=document.getElementById('postDate');
  const postTime=document.getElementById('postTime');
  const postTitle=document.getElementById('postTitle');
  const postDesc=document.getElementById('postDesc');
  const submitBtn=document.getElementById('submitBtn');
  const deleteBtn=document.getElementById('deleteBtn');
  const platformOpts=document.querySelectorAll('.platform-opt');
  const drivePickerBtn=document.getElementById('drivePickerBtn');
  const drivePreview=document.getElementById('drivePreview');
  const driveThumb=document.getElementById('driveThumb');
  const driveThumbnailImg=document.getElementById('driveThumbnailImg');
  const driveThumbIcon=document.getElementById('driveThumbIcon');
  const drivePlayIcon=document.getElementById('drivePlayIcon');
  const driveInfoName=document.getElementById('driveInfoName');
  const driveTypeBadge=document.getElementById('driveTypeBadge');
  const driveFileIdValue=document.getElementById('driveFileIdValue');
  const driveChangeBtn=document.getElementById('driveChangeBtn');
  const driveClearBtn=document.getElementById('driveClearBtn');
  const driveAuthNotice=document.getElementById('driveAuthNotice');
  const driveConfigWarning=document.getElementById('driveConfigWarning');

  // ── GOOGLE APIS ──
  if(DRIVE_CONFIGURED){
    const s1=document.createElement('script');
    s1.src='https://apis.google.com/js/api.js';
    s1.onload=()=>{ window.gapi.load('picker',()=>{ pickerApiLoaded=true; }); };
    document.head.appendChild(s1);

    const s2=document.createElement('script');
    s2.src='https://accounts.google.com/gsi/client';
    s2.onload=()=>{
      tokenClient=window.google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,
        scope:'https://www.googleapis.com/auth/drive.readonly',
        callback:onTokenResponse,
      });
    };
    document.head.appendChild(s2);
  } else {
    driveConfigWarning.classList.add('visible');
  }

  function onTokenResponse(r){
    driveAuthNotice.classList.remove('visible');
    if(r.error){ console.error('Google auth error:',r.error); return; }
    accessToken=r.access_token;
    openDrivePicker();
  }

  function openDrivePicker(){
    if(!pickerApiLoaded){ alert('Google Picker is still loading. Please try again.'); return; }
    const G=window.google.picker;

    const videoView=new G.DocsView()
      .setMimeTypes('video/mp4,video/quicktime,video/x-msvideo,video/webm,video/mpeg')
      .setIncludeFolders(false);

    const imageView=new G.DocsView()
      .setMimeTypes('image/png,image/jpeg,image/webp,application/vnd.google-apps.folder')
      .setIncludeFolders(true)
      .setSelectFolderEnabled(true);

    new G.PickerBuilder()
      .setTitle('Select a video or carousel folder')
      .addView(videoView)
      .addView(imageView)
      .setOAuthToken(accessToken)
      .setDeveloperKey(GOOGLE_API_KEY)
      .setCallback(onPickerPicked)
      .setSize(1020,660)
      .build()
      .setVisible(true);
  }

  async function onPickerPicked(data){
    const G=window.google.picker;
    if(data[G.Response.ACTION]!==G.Action.PICKED) return;
    const doc=data[G.Response.DOCUMENTS][0];
    const fileId=doc[G.Document.ID];
    const fileName=doc[G.Document.NAME];
    const mimeType=doc[G.Document.MIME_TYPE];
    const isFolder=mimeType==='application/vnd.google-apps.folder';

    // Show loading state immediately
    driveInfoName.textContent=fileName;
    driveInfoName.classList.add('drive-loading');
    drivePreview.style.display='flex';
    drivePickerBtn.style.display='none';

    let thumbnailUrl=null;
    try{
      const headers={headers:{Authorization:`Bearer ${accessToken}`}};
      if(isFolder){
        const q=encodeURIComponent(`'${fileId}' in parents and (mimeType='image/png' or mimeType='image/jpeg')`);
        const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(thumbnailLink)&pageSize=1&orderBy=name`,headers);
        const j=await r.json();
        const lnk=j.files?.[0]?.thumbnailLink;
        thumbnailUrl=lnk?lnk.replace(/=s\d+$/,'=s400'):null;
      } else {
        const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=thumbnailLink`,headers);
        const j=await r.json();
        thumbnailUrl=j.thumbnailLink?j.thumbnailLink.replace(/=s\d+$/,'=s400'):null;
      }
    } catch(e){ console.warn('Thumbnail fetch failed:',e); }

    driveInfoName.classList.remove('drive-loading');
    currentDriveFile={id:fileId,name:fileName,mimeType,thumbnailUrl,isFolder};

    // Auto-fill title only if empty
    if(!postTitle.value) postTitle.value=fileName.replace(/\.[^/.]+$/,'');

    renderDrivePreview();
  }

  function renderDrivePreview(){
    if(!currentDriveFile) return;
    const{id,name,mimeType,thumbnailUrl,isFolder}=currentDriveFile;
    const isVideo=!isFolder&&mimeType.startsWith('video/');

    driveInfoName.textContent=name;
    driveFileIdValue.textContent=id;

    driveTypeBadge.className='drive-type-badge';
    if(isFolder){driveTypeBadge.textContent='Carousel';driveTypeBadge.classList.add('folder-badge');}
    else if(isVideo){driveTypeBadge.textContent='Video';driveTypeBadge.classList.add('video-badge');}
    else{driveTypeBadge.textContent='Image';driveTypeBadge.classList.add('image-badge');}

    if(thumbnailUrl){
      driveThumbnailImg.src=thumbnailUrl;
      driveThumbnailImg.style.display='block';
      driveThumbIcon.style.display='none';
      if(isVideo){
        driveThumb.classList.add('is-video');
        drivePlayIcon.style.display='flex';
      } else {
        driveThumb.classList.remove('is-video');
        drivePlayIcon.style.display='none';
      }
    } else {
      driveThumbnailImg.style.display='none';
      drivePlayIcon.style.display='none';
      driveThumb.classList.remove('is-video');
      driveThumbIcon.style.display='flex';
      driveThumbIcon.textContent=isFolder?'📁':isVideo?'🎬':'🖼️';
    }

    drivePreview.style.display='flex';
    drivePickerBtn.style.display='none';
  }

  function clearDriveFile(){
    currentDriveFile=null;
    driveThumbnailImg.src='';
    driveThumbnailImg.style.display='none';
    driveThumbIcon.style.display='none';
    driveThumb.classList.remove('is-video');
    drivePlayIcon.style.display='none';
    drivePreview.style.display='none';
    drivePickerBtn.style.display='flex';
  }

  drivePickerBtn.addEventListener('click',()=>{
    if(!DRIVE_CONFIGURED) return;
    if(!tokenClient){
      driveAuthNotice.classList.add('visible');
      setTimeout(()=>{
        driveAuthNotice.classList.remove('visible');
        if(tokenClient) tokenClient.requestAccessToken({prompt:''});
        else alert('Google Auth is still loading. Please wait and try again.');
      },1500);
      return;
    }
    if(accessToken) openDrivePicker();
    else tokenClient.requestAccessToken({prompt:''});
  });

  driveClearBtn.addEventListener('click',clearDriveFile);
  driveChangeBtn.addEventListener('click',()=>{ clearDriveFile(); setTimeout(()=>drivePickerBtn.click(),50); });

  // ── CALENDAR ──
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  function render(){
    const firstDay=new Date(currentYear,currentMonth,1).getDay();
    const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
    const prevMonthDays=new Date(currentYear,currentMonth,0).getDate();
    monthLabel.textContent=`${MONTHS[currentMonth]} ${currentYear}`;
    let html='';
    for(let i=0;i<35;i++){
      let day,month,year,isOutside=false;
      if(i<firstDay){
        day=prevMonthDays-firstDay+1+i; month=currentMonth-1; year=currentYear;
        if(month<0){month=11;year--;} isOutside=true;
      } else if(i-firstDay>=daysInMonth){
        day=i-firstDay-daysInMonth+1; month=currentMonth+1; year=currentYear;
        if(month>11){month=0;year++;} isOutside=true;
      } else {
        day=i-firstDay+1; month=currentMonth; year=currentYear;
      }
      const isToday=day===now.getDate()&&month===now.getMonth()&&year===now.getFullYear();
      const key=`${year}-${month}-${day}`;
      const dayPosts=posts[key]||[];
      let cls='day-cell';
      if(isOutside) cls+=' outside';
      if(isToday)   cls+=' today';
      html+=`<div class="${cls}" data-year="${year}" data-month="${month}" data-day="${day}">`;
      html+=`<div class="day-num">${day}</div><div class="items">`;
      // Auto-add YT Shorts badge if day has a reel and no existing YT entry
      const hasReel=dayHasReel(dayPosts);
      const hasYT=dayPosts.some(p=>p.platform==='youtube');
      const displayPosts=[...dayPosts];
      if(hasReel&&!hasYT){
        displayPosts.push({platform:'youtube',title:'YT Short',time:dayPosts[0]?.time||'',_auto:true});
      }
      const visible=displayPosts.slice(0,3);
      visible.forEach((p,idx)=>{
        const vc=getVisualClass(p);
        const realIdx=p._auto?-1:idx;
        html+=`<div class="item ${vc}" data-tt-title="${escapeHtml(p.title)}" data-tt-time="${p.time||''}"${realIdx>=0?' data-key="'+key+'" data-idx="'+realIdx+'"':''}><span class="item-dot"></span>`;
        html+=`<span class="item-title">${escapeHtml(p.title)}</span>`;
        if(p.driveFileId) html+=`<span class="item-drive-dot" title="Drive linked"></span>`;
        html+=`</div>`;
      });
      if(displayPosts.length>3) html+=`<div class="more-badge">+${displayPosts.length-3} more</div>`;
      html+=`</div></div>`;
    }
    daysGrid.innerHTML=html;
    daysGrid.querySelectorAll('.day-cell:not(.outside)').forEach(cell=>{
      cell.addEventListener('click',()=>openModal(
        parseInt(cell.dataset.year),parseInt(cell.dataset.month),parseInt(cell.dataset.day)
      ));
    });
    daysGrid.querySelectorAll('.item[data-key]').forEach(item=>{
      item.addEventListener('click',e=>{
        e.stopPropagation();
        openEditModal(item.dataset.key, parseInt(item.dataset.idx));
      });
    });
  }

  function renderWeek(){
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const ws=new Date(weekStart);
    const we=new Date(ws); we.setDate(we.getDate()+6);
    const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if(ws.getMonth()===we.getMonth()){
      monthLabel.textContent=`${MONTHS[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}, ${ws.getFullYear()}`;
    } else {
      monthLabel.textContent=`${MONTHS_SHORT[ws.getMonth()]} ${ws.getDate()} – ${MONTHS_SHORT[we.getMonth()]} ${we.getDate()}, ${we.getFullYear()}`;
    }
    let html='<div class="week-grid">';
    for(let i=0;i<7;i++){
      const d=new Date(ws); d.setDate(d.getDate()+i);
      const day=d.getDate(), month=d.getMonth(), year=d.getFullYear();
      const isToday=day===now.getDate()&&month===now.getMonth()&&year===now.getFullYear();
      const key=`${year}-${month}-${day}`;
      const dayPosts=posts[key]||[];
      html+=`<div class="week-col${isToday?' today':''}" data-year="${year}" data-month="${month}" data-day="${day}">`;
      html+=`<div class="week-col-header"><div class="week-col-day">${DAYS[i]}</div><div class="week-col-date">${day}</div></div>`;
      html+=`<div class="week-col-items">`;
      // Auto-add YT Shorts badge if day has a reel and no existing YT entry
      const hasReelW=dayHasReel(dayPosts);
      const hasYTW=dayPosts.some(p=>p.platform==='youtube');
      const displayPostsW=[...dayPosts];
      if(hasReelW&&!hasYTW){
        displayPostsW.push({platform:'youtube',title:'YT Short',time:dayPosts[0]?.time||'',_auto:true});
      }
      if(displayPostsW.length===0){
        html+=`<div class="week-empty">No posts</div>`;
      }
      displayPostsW.forEach((p,idx)=>{
        const vc=getVisualClass(p);
        const platLabel=vc==='ig-reel'?'IG Reel':p.platform==='instagram'?'IG Carousel':p.platform==='youtube'?'YT Short':'Draft';
        const realIdx=p._auto?-1:idx;
        html+=`<div class="week-item ${vc}"${realIdx>=0?' data-key="'+key+'" data-idx="'+realIdx+'"':''}>`;
        html+=`<div class="week-item-top"><span class="week-item-badge">${platLabel}</span>`;
        if(p.time) html+=`<span class="week-item-time">${p.time}</span>`;
        html+=`</div>`;
        html+=`<div class="week-item-title">${escapeHtml(p.title)}</div>`;
        if(p.description) html+=`<div class="week-item-desc">${escapeHtml(p.description)}</div>`;
        if(p.driveThumbnail) html+=`<div class="week-item-thumb"><img src="${p.driveThumbnail}" alt=""></div>`;
        if(p.driveFileId) html+=`<div class="week-item-drive">${escapeHtml(p.driveFileName||'Drive file')}</div>`;
        html+=`</div>`;
      });
      html+=`</div></div>`;
    }
    html+=`</div>`;
    daysGrid.innerHTML=html;
    daysGrid.querySelectorAll('.week-col').forEach(col=>{
      col.addEventListener('click',()=>openModal(
        parseInt(col.dataset.year),parseInt(col.dataset.month),parseInt(col.dataset.day)
      ));
    });
    daysGrid.querySelectorAll('.week-item[data-key]').forEach(item=>{
      item.addEventListener('click',e=>{
        e.stopPropagation();
        openEditModal(item.dataset.key, parseInt(item.dataset.idx));
      });
    });
  }

  function renderView(){
    if(currentView==='week') renderWeek(); else render();
    document.getElementById('monthViewBtn').classList.toggle('active',currentView==='month');
    document.getElementById('weekViewBtn').classList.toggle('active',currentView==='week');
  }

  function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  // Determine visual class: ig-reel (matcha), instagram (yellow/carousel), youtube (red)
  function getVisualClass(p){
    if(p.platform==='youtube') return 'youtube';
    if(p.platform==='draft') return 'draft';
    // Instagram posts: check if reel or carousel
    const title=(p.title||'').toLowerCase();
    if(p.driveFileType==='carousel'||title.includes('carousel')) return 'instagram';
    return 'ig-reel'; // default instagram to reel (matcha)
  }

  // Check if a day has any reel content
  function dayHasReel(dayPosts){
    return dayPosts.some(p=>{
      if(p.platform==='youtube') return false;
      const title=(p.title||'').toLowerCase();
      if(p.driveFileType==='carousel'||title.includes('carousel')) return false;
      if(p.platform==='instagram'||p.driveFileType==='video'||title.includes('reel')) return true;
      return false;
    });
  }

  function openModal(year,month,day){
    editingPost=null;
    modalTitle.textContent='Schedule Post';
    submitBtn.textContent='Schedule';
    deleteBtn.classList.remove('visible');
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    postDate.value=ds; postTime.value='09:00'; postTitle.value=''; postDesc.value='';
    selectedPlatform=null;
    platformOpts.forEach(o=>o.classList.remove('selected'));
    clearDriveFile();
    overlay.classList.add('open');
    setTimeout(()=>postTitle.focus(),250);
  }

  function openEditModal(key,index){
    const p=posts[key]?.[index];
    if(!p) return;
    editingPost={key,index};
    modalTitle.textContent='Edit Post';
    submitBtn.textContent='Save Changes';
    deleteBtn.classList.add('visible');

    // Pre-fill date from key e.g. "2026-2-14"
    const [ky,km,kd]=key.split('-');
    const ds=`${ky}-${String(parseInt(km)+1).padStart(2,'0')}-${String(kd).padStart(2,'0')}`;
    postDate.value=ds;
    postTime.value=p.time||'09:00';
    postTitle.value=p.title||'';
    postDesc.value=p.description||'';

    // Platform
    selectedPlatform=p.platform||null;
    platformOpts.forEach(o=>{
      o.classList.toggle('selected', o.dataset.platform===selectedPlatform);
    });

    // Drive file
    clearDriveFile();
    if(p.driveFileId){
      currentDriveFile={
        id:p.driveFileId,
        name:p.driveFileName||'Drive file',
        mimeType:p.driveFileType==='video'?'video/mp4':p.driveFileType==='carousel'?'application/vnd.google-apps.folder':'image/png',
        thumbnailUrl:p.driveThumbnail||null,
        isFolder:p.driveFileType==='carousel'
      };
      renderDrivePreview();
    }

    overlay.classList.add('open');
    setTimeout(()=>postTitle.focus(),250);
  }

  function closeModal(){ overlay.classList.remove('open'); editingPost=null; }

  modalClose.addEventListener('click',closeModal);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

  platformOpts.forEach(opt=>{
    opt.addEventListener('click',()=>{
      platformOpts.forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedPlatform=opt.dataset.platform;
    });
  });

  postTitle.addEventListener('input',()=>{ postTitle.style.borderColor=''; });

  submitBtn.addEventListener('click',()=>{
    const title=postTitle.value.trim();
    if(!title){ postTitle.focus(); postTitle.style.borderColor='var(--accent)'; return; }
    if(!selectedPlatform) return;
    const[y,m,d]=postDate.value.split('-');
    const extra={time:postTime.value,description:postDesc.value.trim()};
    if(currentDriveFile){
      extra.driveFileId=currentDriveFile.id;
      extra.driveThumbnail=currentDriveFile.thumbnailUrl;
      extra.driveFileName=currentDriveFile.name;
      extra.driveFileType=currentDriveFile.isFolder?'carousel':currentDriveFile.mimeType.startsWith('video/')?'video':'image';
    } else {
      // Clear drive fields if removed
      extra.driveFileId=null; extra.driveThumbnail=null; extra.driveFileName=null; extra.driveFileType=null;
    }
    if(editingPost){
      updatePost(editingPost.key,editingPost.index,selectedPlatform,title,extra);
    } else {
      addPost(parseInt(y),parseInt(m)-1,parseInt(d),selectedPlatform,title,extra);
    }
    closeModal();
    renderView();
  });

  deleteBtn.addEventListener('click',()=>{
    if(!editingPost) return;
    if(!confirm('Delete this post? This cannot be undone.')) return;
    deletePost(editingPost.key,editingPost.index);
    closeModal();
    renderView();
  });

  document.getElementById('prevBtn').addEventListener('click',()=>{
    if(currentView==='week'){ weekStart.setDate(weekStart.getDate()-7); }
    else { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} }
    renderView();
  });
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(currentView==='week'){ weekStart.setDate(weekStart.getDate()+7); }
    else { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} }
    renderView();
  });
  function jumpToToday(){
    currentYear=now.getFullYear(); currentMonth=now.getMonth();
    weekStart=new Date(now); weekStart.setDate(weekStart.getDate()-weekStart.getDay()); weekStart.setHours(0,0,0,0);
    renderView();
  }
  document.getElementById('todayBtn').addEventListener('click',jumpToToday);
  monthLabel.addEventListener('click',jumpToToday);

  document.getElementById('monthViewBtn').addEventListener('click',()=>{
    currentView='month'; localStorage.setItem('calendarView','month'); renderView();
  });
  document.getElementById('weekViewBtn').addEventListener('click',()=>{
    currentView='week'; localStorage.setItem('calendarView','week');
    // Sync week to current month view
    weekStart=new Date(currentYear,currentMonth,1);
    weekStart.setDate(weekStart.getDate()-weekStart.getDay());
    renderView();
  });

  // ── TOOLTIP ──
  const calTooltip=document.getElementById('calTooltip');
  const ttTitle=document.getElementById('ttTitle');
  const ttTime=document.getElementById('ttTime');
  document.addEventListener('mouseover',e=>{
    const item=e.target.closest('.item[data-tt-title]');
    if(!item){calTooltip.classList.remove('visible');return;}
    ttTitle.textContent=item.dataset.ttTitle;
    const time=item.dataset.ttTime;
    ttTime.textContent=time||'';
    ttTime.style.display=time?'block':'none';
    calTooltip.classList.add('visible');
    const r=item.getBoundingClientRect();
    calTooltip.style.left=r.left+'px';
    calTooltip.style.top=(r.top-calTooltip.offsetHeight-6)+'px';
  });
  document.addEventListener('mouseout',e=>{
    const item=e.target.closest('.item[data-tt-title]');
    if(item) calTooltip.classList.remove('visible');
  });

  renderView();
})();
</script>
</body>
</html>
